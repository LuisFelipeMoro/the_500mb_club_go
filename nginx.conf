worker_processes 1;            # 1 worker handles 4000+ RPS; avoids ~4MB/worker RSS
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    accept_mutex off;          # single worker → no accept contention
}

http {
    access_log off;            # no disk I/O on the hot path
    sendfile on;
    tcp_nodelay on;            # disable Nagle — critical for small-JSON p99
    tcp_nopush off;
    keepalive_timeout 65;
    keepalive_requests 100000; # don't recycle client conns mid-load (the LB is the capacity bottleneck)

    upstream api {
        server api-1:3000;
        server api-2:3000;
        server api-3:3000;
        keepalive 64;          # was 32: more warm upstream conns at peak RPS
        keepalive_requests 100000; # keep upstream conns alive through the run
        keepalive_timeout 60s;
    }

    server {
        listen 80 default_server backlog=1024;

        # /healthz answered locally — never reaches the API (smoke skips
        # X-Instance-Id on this route).
        location = /healthz {
            default_type text/plain;
            return 200 'ok';
        }

        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";   # required for upstream keepalive
            proxy_set_header   Host $host;
            proxy_buffering    off;             # stream small JSON straight through — cuts per-request copy/CPU on the bottleneck LB
        }
    }
}
