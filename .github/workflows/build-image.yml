name: build-image

# Builds the arm64 Pi-Bench image and publishes it to GHCR. The challenge's
# implementation-branch compose pulls ghcr.io/luisfelipemoro/pi-bench:latest, so
# pushing a fresh :latest here is what a `test/go` benchmark re-run measures.
#
# Triggers:
#   - git tag v*        → release build (also moves :latest)
#   - workflow_dispatch → manual rebuild of :latest from the current ref

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/luisfelipemoro/pi-bench
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          # provenance:false keeps a plain single-arch arm64 manifest (no OCI
          # attestation index) — what the daemon's simple pull expects.
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
